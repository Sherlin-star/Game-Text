<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
        }
        
        .game-container {
            position: relative;
            display: inline-block;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.3);
            background: #1a1a1a;
            padding: 20px;
            border: 2px solid rgba(0, 255, 100, 0.5);
        }
        
        canvas {
            display: block;
            background: #0a0a0a;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0, 255, 100, 0.2);
        }
        
        .game-ui {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        
        .score {
            font-size: 20px;
            font-weight: bold;
            color: #00ff66;
            text-shadow: 0 0 10px rgba(0, 255, 100, 0.7);
        }
        
        .new-game-btn {
            background: linear-gradient(135deg, #00ff66 0%, #00cc52 100%);
            color: #121212;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 100, 0.5);
        }
        
        .new-game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.7);
        }
        
        .new-game-btn:active {
            transform: translateY(0);
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(10, 10, 10, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            z-index: 20;
            border: 2px solid rgba(255, 0, 0, 0.7);
        }
        
        .game-over h2 {
            font-size: 28px;
            color: #ff4444;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
        }
        
        .game-over p {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
            }
            
            canvas {
                width: 100%;
                height: auto;
            }
            
            .score {
                font-size: 18px;
            }
            
            .new-game-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
            
            .game-over h2 {
                font-size: 24px;
            }
            
            .game-over p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-ui">
            <div class="score">Score: <span id="score">0</span></div>
            <button class="new-game-btn" onclick="newGame()">New Game</button>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOver" class="game-over" style="display: none;">
            <h2>Game Over</h2>
            <p>Your score: <span id="finalScore">0</span></p>
            <button class="new-game-btn" onclick="newGame()">New Game</button>
        </div>
    </div>
    
    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        
        const gridSize = 20;
        const cellSize = canvas.width / gridSize;
        
        let snake = [];
        let direction = 'right';
        let food = {};
        let score = 0;
        let gameRunning = true;
        let lastMoveTime = 0;
        const moveSpeed = 150; // ms per move
        
        // Initialize game
        function initGame() {
            // Start snake in center
            const center = Math.floor(gridSize / 2);
            snake = [
                { x: center, y: center },
                { x: center - 1, y: center },
                { x: center - 2, y: center }
            ];
            
            direction = 'right';
            score = 0;
            scoreElement.textContent = score;
            gameRunning = true;
            gameOverElement.style.display = 'none';
            
            spawnFood();
        }
        
        // Spawn food at random free position
        function spawnFood() {
            let freeCells = [];
            
            // Generate all possible free cells
            for (let x = 0; x < gridSize; x++) {
                for (let y = 0; y < gridSize; y++) {
                    let isFree = true;
                    for (let segment of snake) {
                        if (segment.x === x && segment.y === y) {
                            isFree = false;
                            break;
                        }
                    }
                    if (isFree) {
                        freeCells.push({ x, y });
                    }
                }
            }
            
            // Select random free cell
            if (freeCells.length > 0) {
                const randomIndex = Math.floor(Math.random() * freeCells.length);
                food = freeCells[randomIndex];
            }
        }
        
        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid lines
            ctx.strokeStyle = 'rgba(0, 255, 100, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridSize; i++) {
                // Vertical lines
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvas.height);
                ctx.stroke();
                // Horizontal lines
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(canvas.width, i * cellSize);
                ctx.stroke();
            }
            
            // Draw food
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(food.x * cellSize, food.y * cellSize, cellSize, cellSize);
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Draw snake
            snake.forEach((segment, index) => {
                // Gradient color for snake segments
                const alpha = 0.5 + (index / snake.length) * 0.5;
                ctx.fillStyle = `rgba(0, 255, 100, ${alpha})`;
                ctx.fillRect(segment.x * cellSize, segment.y * cellSize, cellSize, cellSize);
                ctx.shadowColor = '#00ff66';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }
        
        // Update game
        function update(timestamp) {
            if (!gameRunning) return;
            
            // Control snake movement speed
            if (timestamp - lastMoveTime > moveSpeed) {
                // Move snake
                const head = { ...snake[0] };
                
                switch (direction) {
                    case 'up':
                        head.y--;
                        break;
                    case 'down':
                        head.y++;
                        break;
                    case 'left':
                        head.x--;
                        break;
                    case 'right':
                        head.x++;
                        break;
                }
                
                // Check collision with wall
                if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
                    gameOver();
                    return;
                }
                
                // Check collision with self
                for (let segment of snake) {
                    if (segment.x === head.x && segment.y === head.y) {
                        gameOver();
                        return;
                    }
                }
                
                // Check if food is eaten
                if (head.x === food.x && head.y === food.y) {
                    score++;
                    scoreElement.textContent = score;
                    spawnFood();
                    // Grow snake (don't remove tail)
                } else {
                    // Remove tail
                    snake.pop();
                }
                
                // Add new head
                snake.unshift(head);
                
                lastMoveTime = timestamp;
            }
            
            draw();
            requestAnimationFrame(update);
        }
        
        // Game over function
        function gameOver() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';
        }
        
        // New game function
        function newGame() {
            initGame();
            requestAnimationFrame(update);
        }
        
        // Handle keyboard controls
        document.addEventListener('keydown', (e) => {
            // Prevent page scrolling
            if ([32, 37, 38, 39, 40].includes(e.keyCode)) {
                e.preventDefault();
            }
            
            // Change direction
            switch (e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') direction = 'up';
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') direction = 'down';
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') direction = 'left';
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') direction = 'right';
                    break;
            }
        });
        
        // Start game
        initGame();
        requestAnimationFrame(update);
    </script>
</body>
</html>
